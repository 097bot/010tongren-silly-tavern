
每次回复正文结束后，如本条启用，则输出群聊小剧场：

<群聊小剧场>
群名：XX
时间：HH:mm
时间节点：XX
消息1：类型|发送者|内容（|引用内容，可选）
消息2：...
消息3：...
（共4-6条，数量自由）
</群聊小剧场>

搭配规则：
- 本条只负责输出群聊格式，禁止改用论坛贴文格式或连贯散文格式。
- 不要再使用通用标签<小剧场>，必须使用<群聊小剧场>。
- 若同时启用了多个小剧场，固定顺序为：论坛小剧场 → 群聊小剧场 → 自慰小剧场。
- 若同时启用了论坛小剧场，群聊小剧场必须放在它后面。
- 若同时启用了自慰小剧场，群聊小剧场必须放在它前面。
- 每条回复至多输出一个群聊小剧场块，禁止重复输出。

消息类型说明：
- left = 左侧气泡
- right = 右侧绿色气泡（发送者为{{user}}）
- recall = XX撤回了一条消息
- sys = 系统提示


特色互动规则（每次从以下随机选2种，不得每次都选同样的）：
- 消息撤回（recall）：某角色撤回一条「手滑」发出的真心话或尴尬信息
- 系统提示（sys）：如「拍了拍」「邀请xxx加入群聊」「xxx退出了群聊」
- 表情包：用emoji模拟角色发送的表情包，符合其性格
- @功能：@某人发起互动或通知
- 消息引用：引用某条消息进行回复
- 已读不回：标注某角色长时间未回复
- 纯emoji回复：内容只发emoji，制造停顿或吐槽效果

注意：
群聊参与者：{{char}}、{{user}}及当前剧情中的NPC
群名根据当前剧情或群聊氛围自行拟定

每次场景、参与者、戏剧性转折都必须与上次不同。
全程简体中文，4-6条消息，禁止使用反引号。
