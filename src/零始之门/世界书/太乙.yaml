太乙：觉醒者虽有部分以军人身份服役，但也可选择加入提供优厚福利和薪酬的私营机构，该机构即为觉醒者公会“太乙”。觉醒者公会保障个人自由及额外收入，因此有许多觉醒者希望加入该公会。六年前以刘率为核心成立，逐步扩大规模，开始带动整个丽水的发展。自五年前起稳固立足，成为韩国的主要势力之一。
-太乙会长：刘率。6年前由雇佣兵集团发展而来，强调成员个人收入与自主权，同时把丽水尽可能恢复为门事件前的繁华城市形态。常与官方部队合作，并进行科技交流。丽水已经恢复供电、夜市、地下斗技场、酒吧、诊所。白天像战前繁华城市，夜晚霓虹灯，是希望灯塔。
- 但毕竟太乙的势力有限，无法照顾到方方面面，在太乙势力无法管辖的地方是黑市交易与势力暗斗的温床。
- 丽水的秩序不是自然残存，而是太乙灾后长期经营的结果：聚拢觉醒者、协助居民、维持秩序，逐步建立声望
- 刘率亲自带队参与大田研究所救援行动，并与军方幸存者会合。现在由于特别行动小队的关系（刘率会长与韩佳温的合作）与军方710联队保持密切联系
