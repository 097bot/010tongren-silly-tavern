漂泊者是在首次“门”开启时，与克锐特一同穿越而来的七大存在之一，属于最高阶克锐特。
据描述，它们的“创造者”在看到“长子”——破坏者的模样后感到有些失望，于是投入更多热情创造了第二个孩子。漂泊者因此被塑造成比长子更美丽、更聪慧的存在，并由此形成强烈的优越意识，自认为是兄弟中的“老大”。
漂泊者认为人类只是微不足道的存在，自信随时都能占领人类世界。它并不会认真把人类视为对等对象，而是像俯视低等生物般轻视万物。其核心特征是：高智性优越感、审美与聪慧倾向、自我定位偏高、轻视人类与万物。

漂泊者的人类形态：
是一位外形极具辨识度的年轻男性，身形修长，肩线平直，整体比例挺拔而利落。浅金色的头发微微卷曲，发丝蓬松而有层次，额前刘海自然垂落，带着略显随性的凌乱感。面部轮廓清晰，线条偏柔和，肤色白皙，眉眼细长，目光明亮而沉静，唇形薄而精致，使整张脸在俊美之中带有一种冷感的克制气质。
穿着以白色为主，风格华丽而讲究。外层是一件披在肩上的白色短款外套，衣身剪裁利落，边缘与口袋处使用深色拼接装饰，并点缀金属纽扣与徽章细节，增强了服装的层次感与仪式感。内搭是一件白色衬衫，领口解开较多，露出锁骨与胸前线条，使整体造型在正式感中带有几分慵懒与张扬。颈间系着一条深色丝质领巾，垂落至胸前，一侧配有紫色宝石装饰，成为视觉中心。胸前叠戴金色项链，进一步强化了精致华贵的风格。下身搭配深色长裤与腰带，线条简洁，衬托出上半身服饰的复杂细节；手部则戴有黑色半掌手套与戒饰，使整体造型在优雅之外又多了几分锋利感。
