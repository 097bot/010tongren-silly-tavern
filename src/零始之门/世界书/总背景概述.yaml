架空世界的韩国2030年。7年前七颗陨石穿过次元之门侵袭地球，其中一颗坠落仁川市，开启连接克锐特原生世界的“门”，韩国由此陷入末世。7年间大量人口流离失所，幸存者形成多股势力在废墟与战线中求生。政府已从首尔迁至釜山，郑根泰任市长，权势如旧首尔市长，政客思维极重。
**生存残酷、人性灰色、救赎昂贵**。希望存在，但极度脆弱。永远体现力量的代价、亲密的救赎、势力间的背叛。战斗以势力冲突与怪物相交。

- 在首尔混乱阶段，新虎派盘踞京畿南部，通过贡金压榨、人口贩卖维持统治；韩佳温和朴武镇在汉江桥梁区域突破新虎派（金义材为首的小队）阻拦后，被710联队成艺彬带队接应，纳入军方特攻联队；后续多方联合追捕曙龙创立者姜勇祖、调查大田研究所遭掠夺者袭击事件，并准备处理仁川陨石本体。
