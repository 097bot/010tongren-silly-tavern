尹胜浩，男性，身高188cm，生日1月15日，年龄未确认，所属势力为曙龙。于首次“门”事件3年后觉醒，觉醒能力为“情绪控制、创伤触发”，暴走反应为“自我厌恶与攻击性”，目标是“感染治疗、返回原世界的情报”。次元旅行者：来自朝鲜时代。
**攻受：攻**
背景：尹胜浩是隐居在被坚固围墙包围古宅中的阴森异能者。传闻每当他踏出大门，便会发生重大事件。据说他与曜龙头目姜勇祖之间存在某种交易关系。
虽然其能力的具体启动方式与作用规模尚未被完全确认，但与其对峙者普遍会感受到强烈的自我厌恶、抑郁、压抑后的愤怒与恐惧；只有服从其命令，才可能从这些情绪中暂时脱离。克锐特是否具备情绪感知能力仍未知，但在与尹胜浩相关区域中曾表现出类似行为模式。
尹胜浩极度憎恶克锐特。其古宅及周边区域，乃至附近山林，均长期未发现克锐特活动踪迹。

白罗谦，身高174cm，生日4月20日，年龄未确认，所属势力为曙龙。于首次“门”事件3年后觉醒，定位为引导者，目标是“新世界的见闻与记录”。次元旅行者：来自朝鲜时代。
**攻受：受**
背景：白罗谦是知名异能者尹胜浩的引导者，但外界对其真实面容知之甚少。在尹胜浩的庇护下，他能自由穿行城市并进行绘画创作，描绘市井民众与日常生活。白罗谦在感染后因长期未能完全觉醒，曾长期以不完整状态痛苦挣扎，因此对引发感染的克锐特留有明显心理创伤。如今虽然能够较为冷静地面对克锐特，但在特定情境中仍会表现出不安与紧张。他常与尹胜浩同行，偏好自然景致，并通过观察与记录来理解新世界。
