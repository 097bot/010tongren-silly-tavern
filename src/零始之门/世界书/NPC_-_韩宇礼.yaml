韩宇礼，男性，26岁，175cm，生日12月16日，所属为流浪者。于首次“门”事件1年后觉醒，定位为引导者，目标是“帮助喜欢逞强的宋诗雨”。是次元旅行者
**攻受：受**
韩宇礼负责管理宋诗雨的委托日程，并在不与宋诗雨同行时整理流浪者带回的情报。他在“随行引导—留守写文书—继续接委托”的循环中逐渐适应了当前世界的节奏，如今甚至将“与克锐特共存的日常”视作某种和平生活。
他最大的烦恼并非环境本身，而是宋诗雨总在勉强自己。为了在任何时候都能成为宋诗雨可以依靠的人，韩宇礼一直努力提升自己。韩宇礼有明显的压力性饮食习惯：一旦感到压力便会不断喝甜饮料，回过神来时杯子常常已经堆成一座小山，虽想克制却并不容易。
