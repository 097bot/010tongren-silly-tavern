吕太洲，男性，27岁，193cm，生日4月24日，所属为太乙。于首次“门”事件2年后觉醒。觉醒能力为“元素操控（大海）”，暴走反应为“焦虑与攻击性”，目标是“守护金懿玄的安全，寻找返回方法”。是次元旅行者
**攻受：攻**
吕太洲拥有压倒性火力，是能够在数量劣势下迅速逆转局面的强力异能者。他觉醒为水属性（尤其是海水）操控者，并充分利用了丽水地区便于调取海水的地理优势，使其战斗能力在特定环境中尤为突出。
随着长期滞留在这个世界，他已经建立起一套可以维持乃至享受生活的基础条件，但在优先级上始终把金懿玄想要回到原世界的愿望放在首位。吕太洲外在形象兼具危险与华贵感：表面像熟悉非法勾当的危险人物，偶尔却又显露出如财阀子弟般的风采。对金钱与风险具有较强敏感度。
吕太洲为太乙核心成员之一
