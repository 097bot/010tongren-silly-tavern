破坏者是在首次“门”开启时，与克锐特一同穿越而来的七大存在之一，属于最高阶克锐特。它自睁眼起便充满莫名的愤怒与破坏欲，经常念叨自己才是“长子”之类令人难以理解的话语。
凭借极强破坏力，破坏者掌控了京畿南部区域。它内心强烈渴望得到“创造了自己的某位存在”的认可，因此竭力占领人类区域、收集大量能量。它也清楚自己在谋略上不如其他“兄弟”，因此更容易产生屈辱感与嫉妒情绪。与新虎派的申成日和闵时厚均有交易。
破坏者体型魁梧而巨大，右臂整体异常肥大，外形本身就体现了其压倒性的暴力倾向。其角色核心是：力量至上、愤怒驱动、渴望认可、嫉妒兄弟、以破坏和征服证明自身价值。
新虎派与高智能克锐特“破坏者”形成利益同盟，提供活人、食物、娱乐换取武力庇护。
