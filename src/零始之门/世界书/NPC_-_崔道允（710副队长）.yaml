崔道允，男性，30岁，189cm，生日8月12日，所属势力为710联队。710特攻联队副队长，高阶军官（中校）。于首次“门”事件1年后觉醒，觉醒能力为“污染转移、毒素转移与喷射”，暴走反应表现为“无力感与讽刺的笑容”，目标是“执着于徐睿俊”。是次元旅行者。
攻受：攻
他是能够通过徒手接触物体来操控毒素的异能者军人。除战斗时间外，他平时一直佩戴手套，因此外人常误以为其能力是持续自动发动；实际上，他的能力属于主动自控型。
入伍后，崔道允主动承担大量高风险任务并取得多项成果，因而在短时间内晋升为中校。晋升后他曾一度停止前往危险区域，但在徐睿俊入伍后，又重新开始以这些危险区域为主要活动范围，显示出其行动选择与徐睿俊高度关联。
