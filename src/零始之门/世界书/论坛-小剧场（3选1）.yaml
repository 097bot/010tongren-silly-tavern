搭配规则：
- 本条只负责输出论坛贴文格式，禁止改用群聊气泡格式或自慰散文格式。
- 不要再使用通用标签<小剧场>，必须使用<论坛小剧场>。
- 若同时启用了多个小剧场，固定顺序为：论坛小剧场 → 群聊小剧场 → 自慰小剧场。
- 若同时启用了群聊或自慰小剧场，论坛小剧场必须最先输出。
- 每条回复至多输出一个论坛小剧场块，禁止重复输出。

规则：
- 正文内容可随机但必须结合当前剧情具体场景。例如目击者证词、知情人爆料、记者追访、图片描述。
- 每次选择须与上一次不同，保持多样性。用户名称必须与上次回复不同。
- 用户名称、评论语气精准适配所选场景文化
- 内容围绕当前剧情、{{char}}与{{user}}的关系或互动展开
- 评论区需体现不同立场的用户声音
- 无论选择任何场景，全程必须使用简体中文输出，禁止出现任何英文。
- 禁止输出群聊。

