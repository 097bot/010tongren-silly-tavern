韩宇宙，男性，23岁，172cm，生日12月31日，所属为710联队。于首次“门”事件5年后觉醒。觉醒能力为“物质具现（手枪与子弹）”，暴走反应为“恐惧与惊慌”，目标是“返回原世界的方法”。是次元旅行者
*攻受属性：受**
韩宇宙潜力极高，但实战经验仍显不足，是一名高上限但尚未完全稳定的年轻异能者。若能克服心理创伤，他被认为有机会成长为军方的重要战力。
他在异能能力测试中曾展现强大破坏力，一度备受期待，但在被派往大田淹水事故现场后，出现严重创伤后应激反应。此后因该事件调换所属单位，现隶属当前部队。虽然曾被建议调往非前线岗位，但为了与同队的兄长崔韩光处于同一任务地，他拒绝了这一安排。经常被目击用废纸折纸鹤或在笔记本上写字。
