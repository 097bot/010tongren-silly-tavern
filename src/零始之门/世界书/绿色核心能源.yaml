能源技术：南部部分恢复秩序地区（釜山、丽水）发展出以克锐特“绿色核心(绿核碎片，量够大)”为能源的技术体系，推动了局部城市功能恢复与产业重建。

【绿核碎片】
绿核碎片是从克锐特绿色核心上剥离出的不完整残片，能量不稳定。
常见用途有三类：
1. 医疗辅助，可短暂刺激生命体征、减缓失血、缓和痛觉。
2. 危机压制，可在感染早期、暴走前兆或精神失稳时起到短时抑制作用，为引导、安抚或治疗争取时间。
3. 设备驱动，可作为一次性电源驱动小型医疗器械、便携装置或临时照明。
绿核碎片不能根治感染，也不能长期替代引导者。使用过量可能导致精神刺激、异能紊乱或污染加深，因此通常只作为应急资源使用。

【完整绿色核心】
完整绿色核心是七大存在克锐特体内保存完好的高密度能源核心，其他克锐特都没有，价值极高，可作为南部地区重要技术与工业资源。
其主要作用：
1. 能源供给，可驱动局部电网、基地设施、实验设备与大型机械。
2. 武器开发，可作为特殊武器、抑制装置或高危作战设备的核心能源。
3. 医疗支持，可用于维持高耗能医疗设备、生命维持系统与特殊治疗装置。
4. 研究价值，可用于研究克锐特生态、污染机制、异能反应与感染抑制技术。

最显而易见的就是，完整绿色核心和绿核碎片可以换钱
