<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOREA TECH ATLAS · 韩国科技地图</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020a12;
    --panel-bg: rgba(2, 12, 24, 0.97);
    --grid-line: rgba(0, 210, 255, 0.07);
    --border: rgba(0, 210, 255, 0.18);
    --accent: #00d8ff;
    --accent-glow: rgba(0, 216, 255, 0.35);
    --text: #d0eeff;
    --text-dim: rgba(160, 210, 255, 0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; }

  /* ── LAYOUT ── */
  #root { display: flex; flex-direction: column; height: 100vh; }

  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px; border-bottom: 1px solid var(--border);
    background: rgba(0, 5, 14, 0.9); flex-shrink: 0;
    position: relative; z-index: 10;
  }
  #topbar::after {
    content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 10px var(--accent); opacity: 0.5;
  }
  .tb-brand { display: flex; flex-direction: column; gap: 2px; }
  .tb-title { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 900; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 18px var(--accent-glow); }
  .tb-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
  .tb-right { text-align: right; }
  .tb-coord { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .tb-date { font-size: 9px; color: rgba(0,210,255,0.3); letter-spacing: 1px; margin-top: 3px; }

  #body { display: flex; flex: 1; overflow: hidden; }

  /* ── MAP CONTAINER ── */
  #map-wrap {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #map-wrap::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
                      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  #map-wrap::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(transparent 50%, rgba(0,0,0,0.025) 50%);
    background-size: 100% 3px;
    animation: scan 12s linear infinite;
  }
  @keyframes scan { from { background-position: 0 0; } to { background-position: 0 100%; } }

  #korea-svg { width: 100%; height: 100%; max-width: 680px; max-height: 500px; }

  /* ── CITY MARKERS ── */
  .city-hit { cursor: pointer; }
  .city-hit:hover .ring-outer { animation: ring-expand 1.2s ease-out infinite; }
  .city-hit.active .ring-outer { opacity: 0.7; }
  .city-hit.active .ring-inner { opacity: 0.9; }

  @keyframes ring-expand {
    0%   { r: 18; opacity: 0.5; }
    100% { r: 30; opacity: 0;   }
  }
  @keyframes core-pulse {
    0%, 100% { opacity: 0.75; transform: scale(1); }
    50%       { opacity: 1;    transform: scale(1.25); }
  }
  .core-pulse { animation: core-pulse 2.5s ease-in-out infinite; transform-origin: center; }

  /* ── GYEONGGI REGION ── */
  .gg-region {
    fill: rgba(155, 80, 220, 0.07);
    stroke: rgba(180, 100, 255, 0.45);
    stroke-width: 1.2; stroke-dasharray: 6 4;
    cursor: pointer; transition: fill 0.25s;
  }
  .gg-region:hover, .gg-region.active { fill: rgba(155, 80, 220, 0.17); }

  /* ── INFO PANEL ── */
  #panel {
    width: 310px; flex-shrink: 0;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    transition: width 0.35s ease;
  }
  #panel-shine {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); box-shadow: 0 0 14px var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease; z-index: 2;
  }
  #panel.lit #panel-shine { transform: scaleX(1); }

  #panel-idle {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px; text-align: center; opacity: 0.45;
  }
  .idle-glyph { font-size: 52px; color: var(--accent); margin-bottom: 18px; opacity: 0.3; }
  .idle-text { font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px; line-height: 2; }

  #panel-detail { display: none; flex-direction: column; height: 100%; }
  #panel-detail.show { display: flex; }

  /* panel header */
  .ph {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    position: relative; flex-shrink: 0;
  }
  .ph-badge {
    display: inline-block; font-size: 9px; letter-spacing: 2px;
    padding: 2px 9px; border: 1px solid; border-radius: 2px; margin-bottom: 10px;
    text-transform: uppercase; font-family: 'Orbitron', sans-serif;
  }
  .ph-symbol { position: absolute; top: 18px; right: 20px; font-size: 34px; line-height: 1; }
  .ph-zh { font-family: 'Noto Sans KR', sans-serif; font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .ph-ko { font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--text-dim); margin-bottom: 3px; }
  .ph-en { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); }
  .ph-close {
    position: absolute; top: 14px; right: 62px;
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; padding: 3px 8px; cursor: pointer;
    letter-spacing: 1px; transition: 0.2s;
  }
  .ph-close:hover { border-color: var(--accent); color: var(--accent); }

  /* panel body */
  .pb { flex: 1; overflow-y: auto; padding: 18px 22px; scrollbar-width: thin; scrollbar-color: rgba(0,200,255,0.2) transparent; }
  .pb::-webkit-scrollbar { width: 3px; }
  .pb::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); }

  .ps { margin-bottom: 20px; }
  .ps-label {
    font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 8px;
    padding-bottom: 5px; border-bottom: 1px solid var(--border);
  }
  .ps-desc { font-size: 12.5px; line-height: 2; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; }
  .ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ps-stat {
    background: rgba(0,210,255,0.04); border: 1px solid rgba(0,210,255,0.12);
    padding: 10px; border-radius: 3px;
  }
  .ps-stat-lbl { font-size: 8px; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px; }
  .ps-stat-val { font-family: 'Orbitron', sans-serif; font-size: 13px; }
  .ps-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    font-size: 9px; padding: 3px 9px; border: 1px solid;
    border-radius: 2px; letter-spacing: 0.5px; opacity: 0.8;
    font-family: 'Share Tech Mono', monospace;
  }

  /* panel legend */
  #panel-legend { padding: 12px 22px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .leg-title { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
  .leg-list { display: flex; flex-wrap: wrap; gap: 6px 12px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; cursor: pointer; transition: opacity 0.2s; }
  .leg-item:hover { opacity: 0.8; }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── STATUS BAR ── */
  #statusbar {
    display: flex; align-items: center; gap: 20px;
    padding: 5px 22px; border-top: 1px solid var(--border);
    font-size: 9px; color: var(--text-dim); letter-spacing: 1px;
    background: rgba(0,3,10,0.85); flex-shrink: 0;
  }
  .sb-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #00ff88; margin-right: 5px; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── TOOLTIP ── */
  #tip {
    position: fixed; background: rgba(0,8,20,0.92);
    border: 1px solid; padding: 5px 12px; font-size: 11px;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    z-index: 999; white-space: nowrap; letter-spacing: 0.5px;
  }
  #tip.show { opacity: 1; }
</style>
</head>
<body>
<div id="root">

  <!-- ── TOP BAR ── -->
  <div id="topbar">
    <div class="tb-brand">
      <div class="tb-title">KOREA TECH ATLAS</div>
      <div class="tb-sub">대한민국 기술 지도 &nbsp;·&nbsp; 韩国科技地图</div>
    </div>
    <div class="tb-right">
      <div class="tb-coord">33°N – 38°N &nbsp;|&nbsp; 124°E – 130°E</div>
      <div class="tb-date" id="now-date"></div>
    </div>
  </div>

  <!-- ── BODY ── -->
  <div id="body">

    <!-- MAP -->
    <div id="map-wrap">
      <div id="tip"></div>
      <svg id="korea-svg" viewBox="80 60 520 430" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Glow filters -->
          <filter id="glow-gold"   x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow-cyan"   x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow-purple" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow-map"    x="-8%"  y="-8%"  width="116%" height="116%"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

          <!-- Map body gradient -->
          <radialGradient id="map-fill" cx="50%" cy="50%" r="65%">
            <stop offset="0%"   stop-color="rgba(0,55,90,0.55)"/>
            <stop offset="100%" stop-color="rgba(0,18,42,0.4)"/>
          </radialGradient>

          <!-- Gyeonggi region gradient -->
          <radialGradient id="gg-fill" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="rgba(155,80,220,0.12)"/>
            <stop offset="100%" stop-color="rgba(155,80,220,0.03)"/>
          </radialGradient>

          <!-- animated dash -->
          <style>
            @keyframes dash-flow { to { stroke-dashoffset: -80; } }
            .flow { animation: dash-flow 18s linear infinite; }
            @keyframes islandPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
          </style>
        </defs>

        <!-- Lat/Lon reference lines (very subtle) -->
        <!-- lat 37°N ≈ y=(38.7-37)*90+40=193  -->
        <!-- lat 36°N ≈ y=(38.7-36)*90+40=283  -->
        <!-- lat 35°N ≈ y=(38.7-35)*90+40=373  -->
        <!-- lon 127°E ≈ x=(127-124.5)*90+80=305 -->
        <!-- lon 128°E ≈ x=(128-124.5)*90+80=395 -->
        <!-- lon 129°E ≈ x=(129-124.5)*90+80=485 -->
        <line x1="140" y1="193" x2="560" y2="193" stroke="rgba(0,200,255,0.055)" stroke-width="0.5"/>
        <line x1="140" y1="283" x2="560" y2="283" stroke="rgba(0,200,255,0.055)" stroke-width="0.5"/>
        <line x1="140" y1="373" x2="560" y2="373" stroke="rgba(0,200,255,0.055)" stroke-width="0.5"/>
        <line x1="305" y1="70"  x2="305" y2="460" stroke="rgba(0,200,255,0.055)" stroke-width="0.5"/>
        <line x1="395" y1="70"  x2="395" y2="460" stroke="rgba(0,200,255,0.055)" stroke-width="0.5"/>
        <line x1="485" y1="70"  x2="485" y2="460" stroke="rgba(0,200,255,0.055)" stroke-width="0.5"/>

        <!-- Grid labels -->
        <text x="131" y="196" fill="rgba(0,200,255,0.18)" font-size="8" font-family="'Share Tech Mono',monospace">37°N</text>
        <text x="131" y="286" fill="rgba(0,200,255,0.18)" font-size="8" font-family="'Share Tech Mono',monospace">36°N</text>
        <text x="131" y="376" fill="rgba(0,200,255,0.18)" font-size="8" font-family="'Share Tech Mono',monospace">35°N</text>
        <text x="301" y="462" fill="rgba(0,200,255,0.18)" font-size="8" font-family="'Share Tech Mono',monospace">127°E</text>
        <text x="391" y="462" fill="rgba(0,200,255,0.18)" font-size="8" font-family="'Share Tech Mono',monospace">128°E</text>
        <text x="481" y="462" fill="rgba(0,200,255,0.18)" font-size="8" font-family="'Share Tech Mono',monospace">129°E</text>

        <!-- ══ KOREA MAIN OUTLINE ══
          Formula: x=(lon-124.5)*90+80, y=(38.7-lat)*90+40
          Outline (clockwise from NW border):
            NW ~126.3°E,38°N  → x=242,y=103
            N border → 128.5°E,38.2°N → x=441,y=85
            E coast  → 129.4°E,35.1°N  then south coast → 126.2°E,34.4°N (SW tip)
            W coast  → back NW
        -->
        <path id="korea-body" filter="url(#glow-map)"
          fill="url(#map-fill)"
          stroke="#00c8ee" stroke-width="1.4"
          stroke-linejoin="round" stroke-linecap="round"
          d="M 242,103
             L 316,94  L 370,89  L 415,86  L 441,85
             L 451,86  L 451,113 L 477,128 L 495,160
             L 522,198 L 522,286 L 517,332 L 503,368
             L 484,368
             L 458,385 L 431,385 L 395,394
             L 368,402 L 332,412 L 307,402
             L 279,394 L 260,412 L 243,422
             L 234,432
             L 224,403 L 251,385 L 251,340
             L 279,305 L 279,286
             L 223,224 L 251,214 L 261,205
             L 289,196
             L 270,169 L 270,150 L 261,132
             L 242,103 Z"/>

        <!-- ══ GYEONGGI-DO REGION (clickable) ══ -->
        <!-- Approx border: N-border down to ~lat37°N in south, lon126.5-128°E roughly -->
        <polygon class="gg-region" id="gg-poly"
          points="242,103 316,94 370,89 415,86 431,100 440,128 428,158 402,172 360,182 323,180 305,172 289,157 270,150 261,132 242,103"
          data-city="gyeonggi"/>

        <!-- ══ PROVINCE BOUNDARY LINES ══ -->
        <!-- Gyeonggi south border -->
        <polyline fill="none" stroke="rgba(0,200,255,0.28)" stroke-width="0.8" stroke-dasharray="5 4"
          points="261,132 270,150 289,157 305,172 323,180 360,182 402,172 428,158 440,128 431,100 415,86"/>
        <!-- Gangwon south border (approx) -->
        <polyline fill="none" stroke="rgba(0,200,255,0.22)" stroke-width="0.7" stroke-dasharray="4 5"
          points="440,128 470,168 490,190 480,220 451,215 428,158"/>
        <!-- Chungnam/Jeonbuk divider (approx lat 36°N = y=283) -->
        <polyline fill="none" stroke="rgba(0,200,255,0.22)" stroke-width="0.7" stroke-dasharray="4 5"
          points="251,286 279,275 340,270 395,268 445,265 490,278 517,286"/>
        <!-- Jeonbuk/Gyeongbuk divider -->
        <polyline fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="0.7" stroke-dasharray="4 5"
          points="279,305 340,298 395,295 450,300 490,310 517,332"/>
        <!-- Jeonnam/Gyeongnam divider -->
        <polyline fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="0.7" stroke-dasharray="4 5"
          points="251,340 279,340 340,338 395,342 440,352 480,360 503,368"/>
        <!-- Chungnam/Chungbuk vertical divider (approx) -->
        <line x1="360" y1="182" x2="350" y2="268" stroke="rgba(0,200,255,0.2)" stroke-width="0.7" stroke-dasharray="4 5"/>

        <!-- Province background labels -->
        <text x="467" y="160" text-anchor="middle" fill="rgba(0,200,255,0.14)" font-size="9" font-family="'Share Tech Mono',monospace">강원도</text>
        <text x="312" y="250" text-anchor="middle" fill="rgba(0,200,255,0.13)" font-size="9" font-family="'Share Tech Mono',monospace">충청남도</text>
        <text x="395" y="248" text-anchor="middle" fill="rgba(0,200,255,0.12)" font-size="9" font-family="'Share Tech Mono',monospace">충청북도</text>
        <text x="273" y="350" text-anchor="middle" fill="rgba(0,200,255,0.12)" font-size="9" font-family="'Share Tech Mono',monospace">전라도</text>
        <text x="460" y="300" text-anchor="middle" fill="rgba(0,200,255,0.12)" font-size="9" font-family="'Share Tech Mono',monospace">경상도</text>

        <!-- ══ DATA FLOW LINES between cities ══ -->
        <line class="flow" x1="302" y1="142" x2="278" y2="153" stroke="#00d8ff" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.35"/>
        <line class="flow" x1="302" y1="142" x2="342" y2="242" stroke="#ffd700" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.28" style="animation-delay:2s"/>
        <line class="flow" x1="342" y1="242" x2="348" y2="254" stroke="#00ff88" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.28" style="animation-delay:4s"/>
        <line class="flow" x1="348" y1="254" x2="491" y2="357" stroke="#ff3366" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.25" style="animation-delay:1s"/>
        <line class="flow" x1="491" y1="357" x2="449" y2="385" stroke="#ff00ff" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.25" style="animation-delay:3s"/>
        <line class="flow" x1="363" y1="395" x2="449" y2="385" stroke="#00ced1" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.25" style="animation-delay:5s"/>
        <line class="flow" x1="302" y1="142" x2="491" y2="357" stroke="rgba(255,107,0,0.2)" stroke-width="0.4" stroke-dasharray="2 12" style="animation-delay:6s" class="flow"/>

        <!-- ══ JEJU ISLAND (bonus) ══ -->
        <ellipse cx="291" cy="454" rx="33" ry="13" fill="rgba(0,200,100,0.07)" stroke="rgba(0,200,100,0.3)" stroke-width="0.9" stroke-dasharray="3 3" style="animation:islandPulse 4s ease-in-out infinite"/>
        <text x="291" y="458" text-anchor="middle" fill="rgba(0,200,100,0.45)" font-size="8" font-family="'Share Tech Mono',monospace">제주도</text>

        <!-- ══ CITY MARKERS ══ -->

        <!-- SEOUL ★ Gold -->
        <g class="city-hit" id="m-seoul" data-city="seoul" aria-label="Seoul">
          <circle class="ring-outer" cx="302" cy="142" r="18" fill="rgba(255,215,0,0.05)" stroke="rgba(255,215,0,0.25)" stroke-width="1"/>
          <circle class="ring-inner" cx="302" cy="142" r="11" fill="rgba(255,215,0,0.1)"  stroke="rgba(255,215,0,0.55)" stroke-width="1.2"/>
          <circle cx="302" cy="142" r="5"  fill="#FFD700" filter="url(#glow-gold)" class="core-pulse"/>
          <text x="302" y="145" text-anchor="middle" fill="#FFD700" font-size="7" font-family="'Share Tech Mono',monospace" style="pointer-events:none">★</text>
          <text x="302" y="161" text-anchor="middle" fill="rgba(255,215,0,0.9)" font-size="9" font-family="'Noto Sans KR',sans-serif" style="pointer-events:none">서울</text>
        </g>

        <!-- INCHEON ⬡ Cyan -->
        <g class="city-hit" id="m-incheon" data-city="incheon" aria-label="Incheon">
          <circle class="ring-outer" cx="278" cy="153" r="16" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.2)" stroke-width="1" style="animation-delay:0.5s"/>
          <circle class="ring-inner" cx="278" cy="153" r="10" fill="rgba(0,229,255,0.1)"  stroke="rgba(0,229,255,0.6)" stroke-width="1.2"/>
          <polygon points="278,148 283,151 283,156 278,159 273,156 273,151" fill="#00E5FF" filter="url(#glow-cyan)" class="core-pulse" style="animation-delay:0.5s"/>
          <text x="278" y="171" text-anchor="middle" fill="rgba(0,229,255,0.9)" font-size="9" font-family="'Noto Sans KR',sans-serif" style="pointer-events:none">인천</text>
        </g>

        <!-- GYEONGGI ◆ Purple (label only, region is the polygon) -->
        <g class="city-hit" id="m-gyeonggi" data-city="gyeonggi" aria-label="Gyeonggi-do">
          <polygon points="388,132 394,138 388,144 382,138" fill="rgba(180,100,255,0.85)" filter="url(#glow-purple)" class="core-pulse" style="animation-delay:1s"/>
          <text x="388" y="158" text-anchor="middle" fill="rgba(180,100,255,0.9)" font-size="9" font-family="'Noto Sans KR',sans-serif" style="pointer-events:none">경기도</text>
        </g>

        <!-- SEJONG ◎ Green -->
        <g class="city-hit" id="m-sejong" data-city="sejong" aria-label="Sejong">

  /* ── PANEL LOGIC ── */
  let activeCity = null;

  function openCity(key) {
    const c = CITIES[key];
    if (!c) return;
    activeCity = key;

    // Switch panel state
    document.getElementById('panel-idle').style.display = 'none';
    document.getElementById('panel-detail').classList.add('show');
    document.getElementById('panel').classList.add('lit');

    // Populate
    const badge = document.getElementById('ph-badge');
    badge.textContent = c.badge;
    badge.style.borderColor = c.color;
    badge.style.color = c.color;

    document.getElementById('ph-sym').textContent = c.symbol;
    document.getElementById('ph-sym').style.color = c.color;
    document.getElementById('ph-zh').textContent = c.zh;
    document.getElementById('ph-zh').style.color = c.color;
    document.getElementById('ph-ko').textContent = c.ko;
    document.getElementById('ph-en').textContent = c.en;
    document.getElementById('pd-desc').textContent = c.desc;
    document.getElementById('pd-pop').textContent = c.pop;
    document.getElementById('pd-pop').style.color = c.color;
    document.getElementById('pd-area').textContent = c.area;
    document.getElementById('pd-area').style.color = c.color;
    document.getElementById('pd-type').textContent = c.type;
    document.getElementById('pd-coord').textContent = c.coord;

    // Tags
    const tagsEl = document.getElementById('pd-tags');
    tagsEl.innerHTML = '';
    c.tags.forEach(t => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = t;
      span.style.borderColor = c.color + '55';
      span.style.color = c.color;
      span.style.background = c.color + '0d';
      tagsEl.appendChild(span);
    });

    // Status
    document.getElementById('sb-loc').textContent = `${c.zh}  ${c.coord}`;

    // Highlight markers
    document.querySelectorAll('.city-hit').forEach(el => {
      el.style.opacity = el.id === `m-${key}` ? '1' : '0.35';
    });

    gg.style.opacity = key === 'gyeonggi' ? '1' : '0.4';

    document.querySelector('.pb').scrollTop = 0;

  function closePanel() {

    document.getElementById('panel').classList.remove('lit');
    document.getElementById('sb-loc').textContent = 'SELECT A LOCATION';
    document.querySelectorAll('.city-hit').forEach(el => el.style.opacity = '1');

  /* ── ATTACH CLICKS & TOOLTIP ── */
  const tip = document.getElementById('tip');

  document.querySelectorAll('.city-hit').forEach(el => {
    const key = el.dataset.city;
    const c = CITIES[key];
    if (!c) return;

    el.addEventListener('click', () => openCity(key));

    el.addEventListener('mouseenter', ev => {
      tip.textContent = `${c.zh}  ·  ${c.ko}`;
      tip.style.borderColor = c.color;
      tip.style.color = c.color;
      tip.style.background = 'rgba(0,8,20,0.94)';
      tip.classList.add('show');
    });
    el.addEventListener('mousemove', ev => {
      tip.style.left = (ev.clientX + 14) + 'px';
      tip.style.top  = (ev.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', () => tip.classList.remove('show'));
  });

    tip.style.left = (ev.clientX + 14) + 'px';

  function updateClock() {
    const now = new Date();
    const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const h = String(kst.getHours()).padStart(2,'0');
    const m = String(kst.getMinutes()).padStart(2,'0');
    const s = String(kst.getSeconds()).padStart(2,'0');
    document.getElementById('sb-time').textContent = `KST ${h}:${m}:${s}`;
    const d = kst.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', timeZone:'Asia/Seoul' });
    document.getElementById('now-date').textContent = `KST ${d}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ── ANIMATED RING on outer circles (CSS handles hover, JS for initial pulse offset) ── */
  document.querySelectorAll('.ring-outer').forEach((el, i) => {
    el.style.animationDelay = (i * 0.4) + 's';
  });
</script>
</body>
</html>
