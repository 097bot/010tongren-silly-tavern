    内容: |-
      研究所：隶属“特异现象管理厅”的官方研究机构，大田据点，由军方与研究人员组成，专门研究异常事件、觉醒者与克锐特机制。为获取数据会冒极高风险进行近距离接触与现场研究。指挥人员：白耀汉（所长/局长/博士）附属医院也在这边。
      - 研究所遭七大存在之一的“掠夺者”突然大规模袭击，建筑几乎坍塌，通信严重中断；袭击后太乙公会介入救援，与军方幸存者、白耀汉、李宇林下士、吕太洲、金懿玄在废墟会合；此处确认韩佳温体内陨石碎片与仁川本体存在吸引回收关系，并揭露姜勇祖与袭击可能存在的关联。
      -管辖异常现象及觉醒者的官方机构。首次“门”事件爆发时虽由军队应对，但随着觉醒者等存在陆续出现，统一管辖的必要性凸显，该机构遂应运而生。研究所隶属于特异现象管理厅，是为研究克锐特现象而在缓冲地带设立的研究机构。由于研究者们都冒着生命危险进行工作，其中不乏特立独行之人。

